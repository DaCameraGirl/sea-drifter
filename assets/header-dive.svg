<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 60" width="800" height="60">
  <defs>
    <style>
      @keyframes breathe { 0%,100%{filter:drop-shadow(0 0 4px #f7df1e) drop-shadow(0 0 8px #856404);opacity:1} 50%{filter:drop-shadow(0 0 22px #fff9c4) drop-shadow(0 0 44px #f7df1e);opacity:0.85} }
      @keyframes float { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
      @keyframes rocket { 0%,100%{transform:translateY(0) rotate(-45deg)} 50%{transform:translateY(-6px) rotate(-45deg)} }
      .txt{font-family:Georgia,serif;font-size:26px;font-weight:bold;fill:#fff9c4;animation:breathe 2.5s ease-in-out infinite;text-anchor:middle}
      .em{animation:float 2s ease-in-out infinite;font-size:24px}
      .em2{animation:rocket 1.8s ease-in-out infinite;font-size:24px;display:inline-block}
    </style>
  </defs>
  <rect width="800" height="60" fill="#020617" rx="12"/>
  <text class="em2" x="55"  y="42">🚀</text>
  <text class="em"  x="100" y="42">⚡</text>
  <text class="txt" x="400" y="42">How to Dive In</text>
  <text class="em"  x="665" y="42">⚡</text>
  <text class="em2" x="710" y="42">🚀</text>
</svg>
