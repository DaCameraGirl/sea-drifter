<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 800 140" width="800" height="140">
  <defs>
    <style>
      @keyframes pulse  { 0%,100%{opacity:1;r:8} 50%{opacity:0.2;r:3} }
      @keyframes pulse2 { 0%,100%{opacity:0.4;r:5} 50%{opacity:1;r:10} }
      @keyframes float  { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-8px)} }
      @keyframes blink  { 0%,100%{opacity:1} 45%{opacity:1} 50%{opacity:0} 55%{opacity:1} }
      @keyframes glow   { 0%,100%{filter:drop-shadow(0 0 4px #00b4d8)} 50%{filter:drop-shadow(0 0 18px #caf0f8)} }
      @keyframes spin   { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
      @keyframes ringpulse { 0%,100%{stroke:#00b4d8;stroke-width:3;opacity:1} 50%{stroke:#caf0f8;stroke-width:5;opacity:0.6} }
      @keyframes twinkle { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.1;transform:scale(0.3)} }
      .sp1{animation:pulse 1.5s ease-in-out infinite}
      .sp2{animation:pulse2 2s ease-in-out infinite 0.4s}
      .sp3{animation:pulse 2.5s ease-in-out infinite 0.8s}
      .sp4{animation:pulse2 1.8s ease-in-out infinite 1.2s}
      .title{font-family:Georgia,serif;font-size:24px;font-weight:bold;fill:#caf0f8;animation:glow 2s ease-in-out infinite}
      .sub{font-family:Georgia,serif;font-size:12px;fill:#90e0ef;animation:blink 4s ease-in-out infinite}
      .mf{animation:float 3s ease-in-out infinite;font-size:22px}
      .mf2{animation:float 2.5s ease-in-out infinite 0.6s;font-size:18px}
      .ring{animation:ringpulse 2s ease-in-out infinite;fill:none}
      .ring2{animation:ringpulse 2.5s ease-in-out infinite 0.5s;fill:none}
      .star{animation:twinkle 1.8s ease-in-out infinite; fill:white}
      .star2{animation:twinkle 2.3s ease-in-out infinite 0.5s; fill:#caf0f8}
    </style>
    <radialGradient id="bg" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#023e8a" stop-opacity="0.95"/>
      <stop offset="100%" stop-color="#020617" stop-opacity="1"/>
    </radialGradient>
    <radialGradient id="photoglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#00b4d8" stop-opacity="0"/>
      <stop offset="70%" stop-color="#00b4d8" stop-opacity="0"/>
      <stop offset="100%" stop-color="#00b4d8" stop-opacity="0.6"/>
    </radialGradient>
    <!-- circular clip for photo -->
    <clipPath id="circle-clip">
      <circle cx="90" cy="70" r="52"/>
    </clipPath>
  </defs>

  <!-- background -->
  <rect width="800" height="140" fill="url(#bg)" rx="16"/>

  <!-- twinkling stars scattered -->
  <circle class="star"  cx="200" cy="18" r="2"/>
  <circle class="star2" cx="310" cy="10" r="1.5"/>
  <circle class="star"  cx="420" cy="22" r="2.5"/>
  <circle class="star2" cx="530" cy="12" r="1.5"/>
  <circle class="star"  cx="640" cy="20" r="2"/>
  <circle class="star2" cx="730" cy="30" r="1.5"/>
  <circle class="star"  cx="760" cy="110" r="2"/>
  <circle class="star2" cx="220" cy="120" r="1.5"/>
  <circle class="star"  cx="580" cy="125" r="2.5"/>
  <circle class="star2" cx="680" cy="115" r="1.5"/>

  <!-- sparkle dots -->
  <circle class="sp1" cx="220" cy="35"  r="8" fill="#00b4d8" opacity="0.7"/>
  <circle class="sp2" cx="760" cy="50"  r="5" fill="#90e0ef" opacity="0.6"/>
  <circle class="sp3" cx="700" cy="110" r="7" fill="#caf0f8" opacity="0.5"/>
  <circle class="sp4" cx="250" cy="118" r="5" fill="#00b4d8" opacity="0.7"/>
  <circle class="sp1" cx="490" cy="25"  r="6" fill="#caf0f8" opacity="0.6"/>

  <!-- photo: glowing ring outer -->
  <circle class="ring2" cx="90" cy="70" r="60" stroke="#0096c7" stroke-width="2"/>
  <!-- photo: glowing ring inner -->
  <circle class="ring"  cx="90" cy="70" r="54" stroke="#00b4d8" stroke-width="3"/>
  <!-- photo circle -->
  <image
    href="https://avatars.githubusercontent.com/u/79058390?s=400&u=b79a9f15e933490f2a7b90dacaeac6232c82bbb6&v=4"
    x="38" y="18" width="104" height="104"
    clip-path="url(#circle-clip)"
    preserveAspectRatio="xMidYMid slice"
  />
  <!-- glow overlay on photo -->
  <circle cx="90" cy="70" r="52" fill="url(#photoglow)"/>

  <!-- floating emojis beside photo -->
  <text class="mf2" x="155" y="55">🌊</text>
  <text class="mf"  x="158" y="90">✨</text>

  <!-- title text — pushed right to make room for photo -->
  <text class="title" x="440" y="55" text-anchor="middle">🌊 Lost Little Girl Paths 🌊</text>
  <text class="sub"   x="440" y="78" text-anchor="middle">✨ Every choice ripples like ocean currents ✨</text>
  <text style="font-family:Georgia,serif;font-size:11px;fill:#48cae4;opacity:0.8" x="440" y="98" text-anchor="middle">🐚 branching story · multiple endings · infinite replayability 🐚</text>
  <text style="font-family:Georgia,serif;font-size:10px;fill:#90e0ef;opacity:0.6;font-style:italic" x="440" y="118" text-anchor="middle">Built by DaCameraGirl 📸 — neon brains, bold vibes, ocean logic ⚡</text>

  <!-- right side floating emojis -->
  <text class="mf"  x="730" y="70">🧜‍♀️</text>
  <text class="mf2" x="728" y="100">💎</text>
</svg>
