<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Find Your Way Home</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="wrap">
    <h1>Find Your Way Home</h1>
    <p class="sub">A branching story about a lost little girl choosing her way back home.</p>

    <section class="card">
      <h2 id="sceneTitle">Start</h2>
      <p id="sceneText"></p>
      <div id="choices" class="choices"></div>
      <button id="restartBtn" class="hidden">Play Again</button>
    </section>

    <section class="card small">
      <h3>Path Log</h3>
      <ol id="pathLog"></ol>
    </section>
  </main>

  <script src="app.js"></script>
</body>
</html>
